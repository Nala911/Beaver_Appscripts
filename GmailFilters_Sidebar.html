<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ── Design Tokens ── */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-bg: #eef2ff;
            --surface: #ffffff;
            --background: #f5f3ff;
            --border: #e2e0f5;
            --border-light: #f0eef9;
            --text: #1e1b4b;
            --text-secondary: #6b7280;
            --success: #10b981;
            --success-dark: #059669;
            --success-bg: #ecfdf5;
            --warning: #f59e0b;
            --warning-bg: #fffbeb;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --hover-bg: #f5f3ff;
            --gradient-pull: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-push: linear-gradient(135deg, #10b981, #14b8a6);
            --gradient-header: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899);
            --shadow-sm: 0 1px 3px rgba(99, 102, 241, 0.08);
            --shadow-md: 0 4px 12px rgba(99, 102, 241, 0.10);
            --shadow-lg: 0 8px 24px rgba(99, 102, 241, 0.14);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 13px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            background: var(--surface);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-header);
            border-radius: 0 0 2px 2px;
        }

        .header-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.01em;
        }

        .header-title i {
            background: var(--gradient-pull);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--success-bg);
            color: var(--success);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            letter-spacing: 0.01em;
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            flex-shrink: 0;
        }

        .status-badge.working {
            background: var(--warning-bg);
            color: var(--warning);
            animation: pulse-badge 1.5s ease-in-out infinite;
        }

        .status-badge.working::before {
            background: var(--warning);
            animation: pulse-dot 1s ease-in-out infinite;
        }

        .status-badge.error {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .status-badge.error::before {
            background: var(--danger);
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
        }

        /* ── Main Scroll Area ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
        }

        .main::-webkit-scrollbar {
            width: 5px;
        }

        .main::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 10px;
        }

        /* ── Section Labels ── */
        .section-label {
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-label i {
            color: var(--primary-light);
        }

        /* ── Action Buttons ── */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            border: none;
            height: 40px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.01em;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            background: rgba(255, 255, 255, 0.15);
            transition: opacity 0.2s ease;
        }

        .btn:hover::before { opacity: 1; }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-pull {
            background: var(--gradient-pull);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .btn-pull:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-push {
            background: var(--gradient-push);
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        .btn-push:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
        }

        /* ── Loader ── */
        .loader {
            border: 2.5px solid var(--border-light);
            border-top: 2.5px solid var(--primary);
            border-right: 2.5px solid var(--primary-light);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="header-title">
            <i data-lucide="filter" style="width:18px;"></i>
            Gmail Filters
        </div>
        <div id="statusBadge" class="status-badge">
            Ready
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Action Buttons -->
        <div>
            <div class="section-label">
                <i data-lucide="zap" style="width:13px;"></i> Actions
            </div>
            <div class="btn-group">
                <button id="btn-pull" class="btn btn-pull" onclick="runPull()">
                    <i data-lucide="download" style="width:15px;"></i> Pull
                </button>
                <button id="btn-push" class="btn btn-push" onclick="runPush()">
                    <i data-lucide="upload-cloud" style="width:15px;"></i> Push
                </button>
            </div>
        </div>

    </div>

    <?!= _App_include('SidebarShared'); ?>

    <script>
        // ── Init ──
        window.onload = function () {
            lucide.createIcons();
        };

        function runPull() {
            setStatus('working');
            SyncSidebar.toggleLoading(true, 'Pulling filters from Gmail...');

            SyncSidebar.run('GmailFilters_pullFilters', [], {
                context: 'Pull Filters',
                unwrap: false,
                onSuccess: function(res) {
                    SyncSidebar.toggleLoading(false);
                    setStatus(res.success ? 'ready' : 'error');
                    SyncSidebar.showToast(res.message, !res.success);
                },
                onError: function(err) {
                    SyncSidebar.handleError(err, { context: 'Pull Filters', resetLoading: true });
                    setStatus('error');
                }
            });
        }

        function runPush() {
            setStatus('working');
            SyncSidebar.toggleLoading(true, 'Checking filters and labels...');

            SyncSidebar.confirmAndRun('GmailFilters_getMissingLabels', [], 'GmailFilters_processAction', [], {
                checkText: 'Checking labels...',
                runText: 'Pushing changes...',
                confirmPrefix: 'The following new labels will be created in Gmail:\n\n',
                runContext: 'Push Actions',
                onSuccess: function(res) {
                    SyncSidebar.toggleLoading(false);
                    setStatus(res.success ? 'ready' : 'error');
                    SyncSidebar.showToast(res.message, !res.success);
                },
                onError: function(err) {
                    SyncSidebar.handleError(err, { context: 'Push Actions', resetLoading: true });
                    setStatus('error');
                }
            });
        }

        // ── Helpers ──
        function setStatus(state) {
            var badge = document.getElementById('statusBadge');
            var btns = document.querySelectorAll('.btn');
            badge.className = 'status-badge ' + state;

            if (state === 'working') {
                badge.innerText = 'Working';
                btns.forEach(function (b) { b.disabled = true; });
            } else if (state === 'error') {
                badge.innerText = 'Error';
                btns.forEach(function (b) { b.disabled = false; });
            } else {
                badge.innerText = 'Ready';
                btns.forEach(function (b) { b.disabled = false; });
            }
        }
    </script>
</body>

</html>
