        .loading-overlay {

            z-index: 100;
            align-items: center;
            justify-content: center;

            border: 3px solid var(--bg-light);

            animation: spin 0.8s linear infinite;

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 13px;

        /* ── Toast ── */
        .toast {
            visibility: hidden;
            min-width: 200px;
            background: #323232;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 12px 24px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            z-index: 101;
            box-shadow: 0 3px 6px rgba(0,0,0,0.16);
        }

        .toast.show {
            visibility: visible;
            animation: toastIn 0.3s ease;
        }

        .toast.error-toast { background: var(--danger); }

        @keyframes toastIn {
            from { bottom: 0; opacity: 0; }
            to { bottom: 30px; opacity: 1; }

    <script>
        /**
         * Interacts with the Apps Script backend using the SyncSidebar wrapper.
         */
        function executeBackendAction() {
            var inputVal = document.getElementById('sampleInput').value;
            
            // SyncSidebar.run(methodName, argsArray, options)
            // options: { context, timeoutMs, unwrap, onSuccess, onError }
            // It handles toggleLoading(true/false) and showToast(error) automatically.
            SyncSidebar.run('TemplateTool_processAction', [{ input: inputVal }], {
                context: 'Process Action',
                onSuccess: function(data) {
                    // SyncSidebar.run automatically shows a success toast if 'message' is present in unwrapped data
                    // If you need custom post-run logic, add it here.
                    console.log('Action successful', data);
                }
            });
        }
    </script>
