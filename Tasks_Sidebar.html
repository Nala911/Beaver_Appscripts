<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ── Design Tokens ── */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-bg: #eef2ff;
            --surface: #ffffff;
            --background: #f5f3ff;
            --border: #e2e0f5;
            --border-light: #f0eef9;
            --text: #1e1b4b;
            --text-secondary: #6b7280;
            --success: #10b981;
            --success-dark: #059669;
            --success-bg: #ecfdf5;
            --warning: #f59e0b;
            --warning-bg: #fffbeb;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --hover-bg: #f5f3ff;
            --gradient-pull: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-push: linear-gradient(135deg, #10b981, #14b8a6);
            --gradient-header: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899);
            --shadow-sm: 0 1px 3px rgba(99, 102, 241, 0.08);
            --shadow-md: 0 4px 12px rgba(99, 102, 241, 0.10);
            --shadow-lg: 0 8px 24px rgba(99, 102, 241, 0.14);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 13px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            background: var(--surface);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-header);
            border-radius: 0 0 2px 2px;
        }

        .header-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.01em;
        }

        .header-title i {
            background: var(--gradient-pull);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--success-bg);
            color: var(--success);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            letter-spacing: 0.01em;
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            flex-shrink: 0;
        }

        .status-badge.working {
            background: var(--warning-bg);
            color: var(--warning);
            animation: pulse-badge 1.5s ease-in-out infinite;
        }

        .status-badge.working::before {
            background: var(--warning);
            animation: pulse-dot 1s ease-in-out infinite;
        }

        .status-badge.error {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .status-badge.error::before {
            background: var(--danger);
        }

        @keyframes pulse-badge {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        @keyframes pulse-dot {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.6;
            }
        }

        /* ── Main Scroll Area ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
        }

        .main::-webkit-scrollbar {
            width: 5px;
        }

        .main::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 10px;
        }

        /* ── Section Labels ── */
        .section-label {
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-label i {
            color: var(--primary-light);
        }

        /* ── Card Wrapper ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 14px;
            transition: box-shadow 0.25s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        /* ── List Selector ── */
        .list-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .list-section .card {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 0;
            overflow: hidden;
        }

        .list-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .list-scroll {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .list-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .list-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .list-scroll::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.18);
            border-radius: 10px;
        }

        .list-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.35);
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            gap: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            border-bottom: 1px solid var(--border-light);
            position: relative;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item:hover {
            background: var(--primary-bg);
        }

        .list-item.select-all {
            background: linear-gradient(135deg, #eef2ff, #f5f3ff);
            border-bottom: 2px solid var(--border);
            font-weight: 600;
            color: var(--primary);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        /* ── Custom Checkbox ── */
        .list-item input[type="checkbox"],
        .toggle-row input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 5px;
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            transition: all 0.2s ease;
            background: var(--surface);
        }

        .list-item input[type="checkbox"]:checked,
        .toggle-row input[type="checkbox"]:checked {
            background: var(--gradient-pull);
            border-color: var(--primary);
        }

        .list-item input[type="checkbox"]:checked::after,
        .toggle-row input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            animation: checkPop 0.2s ease;
        }

        @keyframes checkPop {
            0% {
                transform: rotate(45deg) scale(0);
            }

            60% {
                transform: rotate(45deg) scale(1.2);
            }

            100% {
                transform: rotate(45deg) scale(1);
            }
        }

        .list-item input[type="checkbox"]:hover,
        .toggle-row input[type="checkbox"]:hover {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .list-item label {
            cursor: pointer;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }

        /* ── Options / Toggles ── */
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 2px 0;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        /* ── Buttons ── */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            border: none;
            height: 40px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.01em;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            background: rgba(255, 255, 255, 0.15);
            transition: opacity 0.2s ease;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-pull {
            background: var(--gradient-pull);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .btn-pull:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-pull:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 1px 4px rgba(99, 102, 241, 0.3);
        }

        .btn-push {
            background: var(--gradient-push);
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        .btn-push:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
        }

        .btn-push:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 1px 4px rgba(16, 185, 129, 0.3);
        }

        /* ── Console / Log ── */
        .console {
            background: var(--surface);
            border-top: 3px solid;
            border-image: var(--gradient-header) 1;
            padding: 10px 14px;
            min-height: 56px;
            max-height: 90px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Fira Code', 'Roboto Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .console::-webkit-scrollbar {
            width: 4px;
        }

        .console::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.15);
            border-radius: 10px;
        }

        .log-entry {
            margin-bottom: 4px;
            padding: 2px 0;
            line-height: 1.5;
            animation: fadeSlide 0.25s ease;
        }

        .log-entry.error {
            color: var(--danger);
            font-weight: 500;
        }

        .log-entry.success {
            color: var(--success-dark);
            font-weight: 500;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Loader ── */
        .loader {
            border: 2.5px solid var(--border-light);
            border-top: 2.5px solid var(--primary);
            border-right: 2.5px solid var(--primary-light);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Loading Placeholder ── */
        .loading-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px;
            color: var(--text-secondary);
            gap: 12px;
            font-weight: 500;
        }

        .loading-placeholder .loader {
            width: 28px;
            height: 28px;
            border-width: 3px;
        }

        /* ── Fade-in for list items ── */
        .list-item {
            animation: listFadeIn 0.25s ease both;
        }

        @keyframes listFadeIn {
            from {
                opacity: 0;
                transform: translateX(-6px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ── Empty state ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
            color: var(--text-secondary);
            text-align: center;
            gap: 8px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="header-title">
            <i data-lucide="check-square" style="width:18px;"></i>
            Task Sync
        </div>
        <div id="statusBadge" class="status-badge">
            Ready
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- List Selector -->
        <div class="list-section">
            <div class="section-label">
                <i data-lucide="list" style="width:13px;"></i> Task Lists
            </div>
            <div id="loading-lists" class="loading-placeholder">
                <div class="loader"></div> Loading lists…
            </div>
            <div id="list-area" class="card" style="display:none;">
                <div class="list-area">
                    <div class="list-scroll" id="list-selector"></div>
                </div>
            </div>
        </div>

        <!-- Options -->
        <div>
            <div class="section-label">
                <i data-lucide="sliders-horizontal" style="width:13px;"></i> Options
            </div>
            <div class="card">
                <label class="toggle-row">
                    <input type="checkbox" id="include-completed">
                    Include Completed Tasks
                </label>
            </div>
        </div>

        <!-- Action Buttons -->
        <div>
            <div class="section-label">
                <i data-lucide="zap" style="width:13px;"></i> Actions
            </div>
            <div class="btn-group">
                <button id="btn-pull" class="btn btn-pull" onclick="runPull()">
                    <i data-lucide="download" style="width:15px;"></i> Pull
                </button>
                <button id="btn-push" class="btn btn-push" onclick="runPush()">
                    <i data-lucide="upload-cloud" style="width:15px;"></i> Push
                </button>
            </div>
        </div>

    </div>

    <!-- Console -->
    <div id="console" class="console">
        <div class="log-entry">Welcome. Select lists and pull tasks.</div>
    </div>

    <?!= _App_include('SidebarShared'); ?>
    <script>
        // ── Init ──
        window.onload = function () {
            lucide.createIcons();
            BeaverSidebar.run('Tasks_getTaskLists', [], {
                onSuccess: function (data) {
                    renderLists(data.lists);
                },
                toast: false
            });
        };

        // ── Render Task Lists ──
        function renderLists(lists) {
            var container = document.getElementById('list-selector');
            var loader = document.getElementById('loading-lists');
            var area = document.getElementById('list-area');
            container.innerHTML = '';

            if (!lists || lists.length === 0) {
                container.innerHTML = '<div class="empty-state"><i data-lucide="inbox" style="width:28px; color:var(--text-secondary);"></i>No lists found.</div>';
                lucide.createIcons();
            } else {
                // Select All
                var allDiv = document.createElement('div');
                allDiv.className = 'list-item select-all';
                allDiv.innerHTML =
                    '<input type="checkbox" id="select-all" checked onchange="toggleAll(this)">' +
                    '<label for="select-all">Select All</label>';
                container.appendChild(allDiv);

                lists.forEach(function (list, idx) {
                    var div = document.createElement('div');
                    div.className = 'list-item';
                    div.style.animationDelay = (idx * 0.04) + 's';
                    div.innerHTML =
                        '<input type="checkbox" class="list-check" id="' + list.id + '" value="' + list.id + '" checked onchange="checkSelectAll()">' +
                        '<label for="' + list.id + '">' + list.title + '</label>';
                    container.appendChild(div);
                });
            }

            loader.style.display = 'none';
            area.style.display = 'flex';
        }

        function toggleAll(src) {
            var boxes = document.querySelectorAll('.list-check');
            for (var i = 0; i < boxes.length; i++) boxes[i].checked = src.checked;
        }

        function checkSelectAll() {
            var boxes = document.querySelectorAll('.list-check');
            var allChecked = true;
            for (var i = 0; i < boxes.length; i++) {
                if (!boxes[i].checked) {
                    allChecked = false;
                    break;
                }
            }
            var selectAll = document.getElementById('select-all');
            if (selectAll) selectAll.checked = allChecked;
        }

        // ── Pull ──
        function runPull() {
            var boxes = document.querySelectorAll('.list-check:checked');
            var ids = [];
            for (var i = 0; i < boxes.length; i++) ids.push(boxes[i].value);
            if (ids.length === 0) { log('Select at least one list.', 'error'); return; }

            var incl = document.getElementById('include-completed').checked;
            setStatus('working');
            log('Pulling tasks…');

            google.script.run
                .withSuccessHandler(function (res) {
                    setStatus(res.success ? 'ready' : 'error');
                    log(res.message, res.success ? 'success' : 'error');
                })
                .withFailureHandler(handleError)
                .Tasks_pullRPC(ids, incl);
        }

        // ── Push ──
        function runPush() {
            setStatus('working');
            log('Pushing changes…');

            google.script.run
                .withSuccessHandler(function (res) {
                    setStatus(res.success ? 'ready' : 'error');
                    log(res.message, res.success ? 'success' : 'error');
                })
                .withFailureHandler(handleError)
                .Tasks_pushRPC();
        }

        // ── Helpers ──
        function setStatus(state) {
            var badge = document.getElementById('statusBadge');
            var btns = document.querySelectorAll('.btn');
            badge.className = 'status-badge ' + state;

            if (state === 'working') {
                badge.innerHTML = '<div class="loader" style="width:10px;height:10px;border-width:1.5px;"></div> Syncing…';
                btns.forEach(function (b) { b.disabled = true; });
            } else if (state === 'error') {
                badge.innerText = 'Error';
                btns.forEach(function (b) { b.disabled = false; });
            } else {
                badge.innerText = 'Ready';
                btns.forEach(function (b) { b.disabled = false; });
            }
        }

        function log(msg, type) {
            var con = document.getElementById('console');
            var div = document.createElement('div');
            div.className = 'log-entry ' + (type || '');
            div.innerText = '› ' + msg;
            con.appendChild(div);
            con.scrollTop = con.scrollHeight;
        }

        function handleError(err) {
            log(err.message || err, 'error');
            setStatus('error');
            google.script.run._App_logClientError(err, 'Sidebar Operation');
        }
    </script>
</body>

</html>
