<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    /* ── Design Tokens ── */
    :root {
      --primary: #10b981; /* Green for Chat */
      --primary-light: #34d399;
      --primary-bg: #ecfdf5;
      --surface: #ffffff;
      --background: #f8fafc;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --text: #0f172a;
      --text-secondary: #64748b;
      --success: #10b981;
      --success-dark: #059669;
      --danger: #ef4444;
      --danger-bg: #fef2f2;
      --gradient-pull: linear-gradient(135deg, #10b981, #059669);
      --gradient-push: linear-gradient(135deg, #3b82f6, #2563eb);
      --gradient-header: linear-gradient(90deg, #10b981, #3b82f6, #8b5cf6);
      --shadow-sm: 0 1px 3px rgba(16, 185, 129, 0.08);
      --shadow-md: 0 4px 12px rgba(16, 185, 129, 0.10);
      --shadow-lg: 0 8px 24px rgba(16, 185, 129, 0.14);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--background);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-header);
      border-radius: 0 0 2px 2px;
    }

    .header .material-icons-outlined {
      font-size: 22px;
      background: var(--gradient-pull);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    /* ── Main Container ── */
    .container {
      flex: 1;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      min-height: 0;
    }

    .container::-webkit-scrollbar {
      width: 5px;
    }

    .container::-webkit-scrollbar-thumb {
      background: rgba(16, 185, 129, 0.2);
      border-radius: 10px;
    }

    /* ── Section Labels ── */
    .section-label {
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label .material-icons-outlined {
      font-size: 15px;
      color: var(--primary-light);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 14px;
      transition: box-shadow 0.25s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 0;
      height: 40px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.01em;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: rgba(255, 255, 255, 0.15);
      transition: opacity 0.2s ease;
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn-primary {
      background: var(--gradient-pull);
      color: white;
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(16, 185, 129, 0.3);
    }

    .btn-success {
      background: var(--gradient-push);
      color: white;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    .btn-success:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
    }

    .btn-success:active {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(59, 130, 246, 0.3);
    }

    .btn .material-icons-outlined {
      font-size: 17px;
    }

    /* ── Loading Overlay ── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(248, 250, 252, 0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }

    .spinner {
      border: 3px solid var(--border-light);
      border-top: 3px solid var(--primary);
      border-right: 3px solid var(--primary-light);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      animation: spin 0.8s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* ── Toast ── */
    .toast {
      visibility: hidden;
      min-width: 220px;
      background: var(--text);
      color: #fff;
      text-align: center;
      border-radius: var(--radius-sm);
      padding: 11px 18px;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 500;
      z-index: 101;
      box-shadow: var(--shadow-lg);
    }

    .toast.show {
      visibility: visible;
      animation: toastIn 0.35s ease, toastOut 0.35s ease 3.15s;
    }

    .toast.error-toast {
      background: var(--danger);
    }

    @keyframes toastIn {
      from {
        bottom: 0;
        opacity: 0;
        transform: translateX(-50%) scale(0.95);
      }

      to {
        bottom: 30px;
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    @keyframes toastOut {
      from {
        bottom: 30px;
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }

      to {
        bottom: 0;
        opacity: 0;
        transform: translateX(-50%) scale(0.95);
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <span class="material-icons-outlined">forum</span>
    <div class="header-title">Google Chat Spaces</div>
  </div>

  <!-- Main Content -->
  <div class="container">

    <!-- Import Actions -->
    <div>
      <div class="section-label">
        <span class="material-icons-outlined">cloud_download</span> Import Members
      </div>
      <div class="card">
        <p style="color: var(--text-secondary); margin-bottom: 14px; line-height: 1.5;">
          Fetch all members from every Chat Space you belong to and import them into the sheet.
        </p>
        <button class="btn btn-primary" onclick="runPull()">
          <span class="material-icons-outlined">cloud_download</span>
          Pull All Members
        </button>
      </div>
    </div>

    <!-- Sync Actions -->
    <div>
      <div class="section-label">
        <span class="material-icons-outlined">sync</span> Sync Changes
      </div>
      <div class="card">
        <button class="btn btn-success" onclick="runPush()">
          <span class="material-icons-outlined">cloud_upload</span>
          Push Changes
        </button>
      </div>
    </div>

  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Processing…</div>
  </div>
  <div id="toast" class="toast">Done</div>

  <?!= _App_include('SidebarShared'); ?>
  <script>
    // --- INITIALIZATION ---
    window.onload = function () {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    };

    function runPull() {
      SyncSidebar.run('ChatSpaceSync_checkForUnsavedChanges', [], {
        unwrap: false,
        context: 'Check Changes',
        onSuccess: function (res) {
          if (res.data === true) {
            const confirmPull = confirm("⚠️ WARNING: Unsaved changes detected in the 'Action' column.\n\nRunning 'Pull' will overwrite these changes and they will be LOST.\n\nDo you want to continue?");
            if (!confirmPull) return;
          }
          executePull();
        }
      });
    }

    function executePull() {
      SyncSidebar.toggleLoading(true, "Importing all members…");
      SyncSidebar.run('ChatSpaceSync_pullMembers', [], {
        context: 'Pull Members',
        onSuccess: function (res) { 
          SyncSidebar.toggleLoading(false); 
          SyncSidebar.showToast(res.message); 
        },
        onError: function () { 
          SyncSidebar.toggleLoading(false); 
        }
      });
    }

    function runPush() {
      SyncSidebar.toggleLoading(true, "Syncing changes…");
      SyncSidebar.run('ChatSpaceSync_pushChanges', [], {
        context: 'Push Changes',
        onSuccess: function (res) { 
          SyncSidebar.toggleLoading(false); 
          SyncSidebar.showToast(res.message); 
        },
        onError: function () { 
          SyncSidebar.toggleLoading(false); 
        }
      });
    }
  </script>
</body>

</html>
