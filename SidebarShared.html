<script>
  var SyncSidebar = (function () {
    function getMessage(value) {
      if (value && typeof value === 'object' && value.message) return String(value.message);
      return String(value || 'Unknown error');
    }

    function logClientError(detail, context) {
      try {
        google.script.run._App_logClientError(detail, context || 'Sidebar Operation');
      } catch (ignore) {}
    }

    function installGlobalErrorHandlers() {
      window.onerror = function (msg, url, line, col, error) {
        var detail = 'Error: ' + msg + '\nURL: ' + url + '\nLine: ' + line + ', Col: ' + col + (error ? '\nStack: ' + error.stack : '');
        logClientError(detail, 'Global Error');
        return false;
      };

      window.onunhandledrejection = function (event) {
        logClientError(getMessage(event && event.reason), 'Unhandled Promise Rejection');
      };
    }

    function toggleLoading(show, text, options) {
      var opts = options || {};
      var overlay = document.getElementById(opts.overlayId || 'loadingOverlay');
      var textNode = document.getElementById(opts.textId || 'loadingText');
      if (overlay) overlay.style.display = show ? 'flex' : 'none';
      if (show && text && textNode) textNode.innerText = text;
    }

    function showToast(message, isError, options) {
      var opts = options || {};
      var node = document.getElementById(opts.toastId || 'toast');
      if (!node) return;

      node.innerText = getMessage(message);
      node.className = isError ? 'toast error-toast show' : 'toast show';
      
      // Keep error toasts visible longer, or don't auto-hide them immediately
      var duration = isError ? 10000 : (opts.duration || 3500);
      setTimeout(function () {
        node.className = node.className.replace('show', '').trim();
      }, duration);
    }

    function showCopyableError(msg, severity) {
        var overlay = document.createElement('div');
        overlay.style.position = 'fixed';
        overlay.style.top = '0'; overlay.style.left = '0';
        overlay.style.width = '100%'; overlay.style.height = '100%';
        overlay.style.backgroundColor = 'rgba(0,0,0,0.5)';
        overlay.style.zIndex = '9999';
        overlay.style.display = 'flex';
        overlay.style.justifyContent = 'center';
        overlay.style.alignItems = 'center';

        var box = document.createElement('div');
        box.style.backgroundColor = '#fff';
        box.style.padding = '20px';
        box.style.borderRadius = '8px';
        box.style.width = '80%';
        box.style.maxWidth = '400px';
        box.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';
        box.style.fontFamily = 'sans-serif';

        var title = document.createElement('h3');
        var severityTitle = 'System Error';
        var titleColor = '#dc2626'; // Default critical

        if (severity === 'mild') {
            severityTitle = 'Notice';
            titleColor = '#2563eb'; // Blue
        } else if (severity === 'medium') {
            severityTitle = 'Warning';
            titleColor = '#d97706'; // Amber
        }

        title.innerText = severityTitle;
        title.style.margin = '0 0 10px 0';
        title.style.color = titleColor;

        var textarea = document.createElement('textarea');
        textarea.value = msg;
        textarea.readOnly = true;
        textarea.style.width = '100%';
        textarea.style.height = '100px';
        textarea.style.marginBottom = '15px';
        textarea.style.padding = '8px';
        textarea.style.border = '1px solid #ccc';
        textarea.style.borderRadius = '4px';
        textarea.style.boxSizing = 'border-box';
        textarea.style.resize = 'vertical';

        var btn = document.createElement('button');
        btn.innerText = 'Close';
        btn.style.padding = '8px 16px';
        btn.style.backgroundColor = '#e5e7eb';
        btn.style.color = '#374151';
        btn.style.border = 'none';
        btn.style.borderRadius = '4px';
        btn.style.cursor = 'pointer';
        btn.style.fontWeight = '500';
        btn.onclick = function() { document.body.removeChild(overlay); };

        box.appendChild(title);
        box.appendChild(textarea);
        box.appendChild(btn);
        overlay.appendChild(box);
        document.body.appendChild(overlay);
    }

    function unwrap(result) {
      if (result && typeof result === 'object' && Object.prototype.hasOwnProperty.call(result, 'success')) {
        if (!result.success) {
          throw new Error(result.message || 'Operation failed.');
        }
        if (result.data !== undefined && result.data !== null) {
          if (typeof result.data === 'object' && !Array.isArray(result.data)) {
            var merged = {};
            Object.keys(result.data).forEach(function (key) {
              merged[key] = result.data[key];
            });
            if (merged.message === undefined) merged.message = result.message;
            if (merged.meta === undefined) merged.meta = result.meta;
            if (merged.success === undefined) merged.success = result.success;
            return merged;
          }
          return {
            success: result.success,
            message: result.message,
            data: result.data,
            meta: result.meta
          };
        }
      }
      return result;
    }

    function handleError(err, options) {
      var opts = options || {};
      if (opts.resetLoading !== false) toggleLoading(false, null, opts);
      var msg = getMessage(err);
      if (opts.toast !== false) showToast(msg, true, opts);
      logClientError(msg, opts.context || 'Sidebar Operation');
      if (typeof opts.onError === 'function') {
        opts.onError(err);
      }
      // Show copyable overlay for easy troubleshooting
      showCopyableError(msg, opts.severity || 'critical');
    }

    function run(methodName, args, options) {
      var opts = options || {};
      var timeoutMs = typeof opts.timeoutMs === 'number' ? opts.timeoutMs : 20000;
      var settled = false;
      var timeoutId = setTimeout(function () {
        if (settled) return;
        settled = true;
        handleError(new Error(methodName + ' timed out after ' + timeoutMs + 'ms.'), opts);
      }, timeoutMs);

      var runner = google.script.run
        .withSuccessHandler(function (result) {
          if (settled) return;
          settled = true;
          clearTimeout(timeoutId);
          try {
            var payload = opts.unwrap === false ? result : unwrap(result);
            if (typeof opts.onSuccess === 'function') {
              opts.onSuccess(payload, result);
            }
          } catch (err) {
            handleError(err, opts);
          }
        })
        .withFailureHandler(function (err) {
          if (settled) return;
          settled = true;
          clearTimeout(timeoutId);
          handleError(err, opts);
        });

      runner[methodName].apply(runner, args || []);
    }

    /**
     * Unified pattern: Check for something (e.g. missing labels), 
     * confirm with user if found, then run the main task.
     */
    function confirmAndRun(checkMethod, checkArgs, runMethod, runArgs, options) {
        var opts = options || {};
        toggleLoading(true, opts.checkText || 'Validating...');
        
        run(checkMethod, checkArgs, {
            context: opts.checkContext || 'Validation',
            onSuccess: function(checkResult) {
                var itemsToConfirm = Array.isArray(checkResult) ? checkResult : [];
                if (itemsToConfirm.length > 0) {
                    toggleLoading(false);
                    var msg = (opts.confirmPrefix || "The following items will be created:\n\n") +
                              itemsToConfirm.join('\n') +
                              (opts.confirmSuffix || "\n\nDo you want to proceed?");
                    if (!window.confirm(msg)) return;
                    toggleLoading(true, opts.runText || 'Processing...');
                } else {
                    toggleLoading(true, opts.runText || 'Processing...');
                }

                run(runMethod, runArgs, {
                    context: opts.runContext || 'Execution',
                    onSuccess: function(res) {
                        toggleLoading(false);
                        if (typeof opts.onSuccess === 'function') opts.onSuccess(res);
                        else if (res && res.message) showToast(res.message);
                    },
                    onError: function(err) {
                        toggleLoading(false);
                        if (typeof opts.onError === 'function') opts.onError(err);
                    }
                });
            },
            onError: function(err) {
                toggleLoading(false);
                if (typeof opts.onError === 'function') opts.onError(err);
            }
        });
    }

    installGlobalErrorHandlers();

    return {
      run: run,
      confirmAndRun: confirmAndRun,
      unwrap: unwrap,
      handleError: handleError,
      logClientError: logClientError,
      showToast: showToast,
      toggleLoading: toggleLoading
    };
  })();
</script>
