<style>
:root {
            /* Google Workspace Theme Variables */
            --app-bg: #f8f9fa;
            --panel-bg: #ffffff;
            --border-color: #dadce0;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --accent-color: #1a73e8;
            --accent-hover: #174ea6;
            --accent-light: #e8f0fe;
            --success-color: #188038;
            --error-color: #d93025;
            --warning-color: #f9ab00;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 20px;
            --shadow-sm: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
            --shadow-md: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 2px 6px 2px rgba(60, 64, 67, 0.15);
            --shadow-lg: 0 1px 3px 0 rgba(60, 64, 67, 0.3), 0 4px 8px 3px rgba(60, 64, 67, 0.15);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);

            /* User Sheet Theme Variables (Updated via JS) */
            --sheet-header-bg: #424242;
            --sheet-action-bg: #2e5a70;
            --sheet-status-col-bg: #3f525c;
            --sheet-editable-bg: #528dab;
            --sheet-readonly-bg: #655356;
            --sheet-text: #ffffff;
            --sheet-border: #ffffff;
            --sheet-border-style: solid;
            --sheet-border-width: 1px;
            --sheet-font-primary: 'Roboto', sans-serif;
            --sheet-font-mono: 'Consolas', monospace;
            --sheet-header-size: 11px;
            --sheet-body-size: 10px;
            --sheet-header-weight: bold;
            --sheet-header-italic: normal;
            --sheet-align-h: center;
            --sheet-align-v: middle;
            --sheet-body-align-h: left;
            --sheet-body-align-v: middle;
            --sheet-header-row-height: 45px;
            --sheet-body-row-height: 35px;
            --sheet-status-success: #1e8e3e;
            --sheet-status-pending: #f9ab00;
            --sheet-status-error: #d93025;
            --sheet-status-synced: #1a73e8;
            --sheet-status-warning: #f29900;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', 'Roboto', 'Inter', sans-serif;
        }

        body {
            background-color: var(--app-bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Top Header Area */
        header {
            padding: 12px 24px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 22px;
            font-weight: 400;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        /* Buttons */
        button {
            padding: 0 24px;
            border-radius: var(--radius-lg);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 36px;
            letter-spacing: 0.25px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--accent-light);
            border-color: transparent;
        }

        /* 3-Column Layout */
        .dashboard-container {
            display: grid;
            grid-template-columns: 260px 340px 1fr;
            flex: 1;
            height: calc(100vh - 61px);
        }

        /* Column 1: Navigation */
        .nav-col {
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            padding: 10px 24px;
            margin: 0 16px 0 0;
            border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-item:hover {
            background: rgba(60, 64, 67, 0.04);
        }

        .nav-item.active {
            background: var(--accent-light);
            color: var(--accent-color);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .nav-item:not(.active) svg {
            stroke: var(--text-secondary);
        }

        /* Column 2: Settings Panel */
        .settings-col {
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 24px 32px;
            overflow-y: auto;
        }

        .settings-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .settings-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 24px;
            color: var(--accent-color);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        /* Modern Inputs */
        .color-picker-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--panel-bg);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .color-picker-row:focus-within {
            border: 2px solid var(--accent-color);
            padding: 5px 11px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
            padding: 0;
            overflow: hidden;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
        }

        .color-hex {
            font-family: 'Roboto Mono', 'Consolas', monospace;
            font-size: 14px;
            color: var(--text-primary);
            border: none;
            background: transparent;
            outline: none;
            width: 90px;
            text-transform: uppercase;
        }

        select,
        input[type="text"] {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: var(--transition);
            outline: none;
        }

        .range-wrapper input[type="number"] {
            width: 70px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 8px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            text-align: center;
            outline: none;
            transition: var(--transition);
        }

        select:focus,
        input[type="text"]:focus {
            border: 2px solid var(--accent-color);
            padding: 9px 11px;
        }

        .range-wrapper input[type="number"]:focus {
            border: 2px solid var(--accent-color);
            padding: 9px 7px;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%235f6368%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 10px auto;
        }

        /* Segmented Controls for Alignment/wrapping */
        .segmented-control {
            display: flex;
            background: var(--app-bg);
            padding: 4px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }

        .segment {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            border-radius: 4px;
            transition: var(--transition);
        }

        .segment:hover {
            color: var(--text-primary);
            background: rgba(60, 64, 67, 0.04);
        }

        .segment.active {
            background: var(--panel-bg);
            color: var(--accent-color);
            box-shadow: var(--shadow-sm);
        }

        .segment input[type="radio"] {
            display: none;
        }

        /* Range Slider */
        .range-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--accent-color);
            height: 4px;
            border-radius: 2px;
            background: var(--border-color);
            outline: none;
        }

        /* Column 3: Live Preview Area */
        .preview-col {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--app-bg);
            overflow-y: auto;
        }

        .preview-title {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            width: 100%;
            max-width: 600px;
        }

        .mock-sheet {
            background: var(--panel-bg);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .mock-sheet-header-bar {
            background: #f8f9fa;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .mock-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border-color);
        }

        .mock-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--sheet-font-primary);
            color: var(--sheet-text);
        }

        .mock-table th {
            background-color: var(--sheet-header-bg);
            font-size: var(--sheet-header-size);
            font-weight: var(--sheet-header-weight);
            font-style: var(--sheet-header-italic);
            text-align: var(--sheet-align-h);
            vertical-align: var(--sheet-align-v);
            padding: 12px;
            border: var(--sheet-border-width) var(--sheet-border-style) var(--sheet-border);
            height: var(--sheet-header-row-height);
        }

        .mock-table td {
            font-size: var(--sheet-body-size);
            text-align: var(--sheet-body-align-h);
            vertical-align: var(--sheet-body-align-v);
            padding: 10px 12px;
            border: var(--sheet-border-width) var(--sheet-border-style) var(--sheet-border);
            height: var(--sheet-body-row-height);
            white-space: var(--mock-white-space, nowrap);
            overflow: var(--mock-overflow, hidden);
            text-overflow: var(--mock-text-overflow, clip);
            max-width: 150px;
        }

        .cell-action {
            background-color: var(--sheet-action-bg);
        }

        .cell-status-col {
            background-color: var(--sheet-status-col-bg);
        }

        .cell-editable {
            background-color: var(--sheet-editable-bg);
        }

        .cell-readonly {
            background-color: var(--sheet-readonly-bg);
        }

        .cell-mono {
            font-family: var(--sheet-font-mono);
        }

        .mock-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            color: white;
            letter-spacing: 0.25px;
        }

        /* Preview statuses mapped exactly as variables */
        .status-success {
            background-color: var(--sheet-status-success);
        }

        .status-pending {
            background-color: var(--sheet-status-pending);
        }

        .status-error {
            background-color: var(--sheet-status-error);
        }

        .status-synced {
            background-color: var(--sheet-status-synced);
        }

        .status-warning {
            background-color: var(--sheet-status-warning);
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #323232;
            color: white;
            padding: 14px 24px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 400;
            box-shadow: var(--shadow-md);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        #toast.error {
            background: var(--error-color);
        }
</style>
