<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    /* ── Design Tokens ── */
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-bg: #eef2ff;
      --surface: #ffffff;
      --background: #f5f3ff;
      --border: #e2e0f5;
      --border-light: #f0eef9;
      --text: #1e1b4b;
      --text-secondary: #6b7280;
      --success: #10b981;
      --success-dark: #059669;
      --danger: #ef4444;
      --danger-bg: #fef2f2;
      --gradient-pull: linear-gradient(135deg, #6366f1, #8b5cf6);
      --gradient-push: linear-gradient(135deg, #10b981, #14b8a6);
      --gradient-header: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899);
      --shadow-sm: 0 1px 3px rgba(99, 102, 241, 0.08);
      --shadow-md: 0 4px 12px rgba(99, 102, 241, 0.10);
      --shadow-lg: 0 8px 24px rgba(99, 102, 241, 0.14);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--background);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-header);
      border-radius: 0 0 2px 2px;
    }

    .header .material-icons-outlined {
      font-size: 22px;
      background: var(--gradient-pull);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    /* ── Main Container ── */
    .container {
      flex: 1;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      min-height: 0;
    }

    .container::-webkit-scrollbar {
      width: 5px;
    }

    .container::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.2);
      border-radius: 10px;
    }

    /* ── Section Labels ── */
    .section-label {
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label .material-icons-outlined {
      font-size: 15px;
      color: var(--primary-light);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 14px;
      transition: box-shadow 0.25s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    .card-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ── Calendar List (Expandable) ── */
    .cal-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .cal-section>.card {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .cal-list-container {
      flex: 1;
      overflow-y: auto;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
      min-height: 0;
    }

    .cal-list-container::-webkit-scrollbar {
      width: 5px;
    }

    .cal-list-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .cal-list-container::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.18);
      border-radius: 10px;
    }

    .cal-list-container::-webkit-scrollbar-thumb:hover {
      background: rgba(99, 102, 241, 0.35);
    }

    .cal-item {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      gap: 10px;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: all 0.15s ease;
      animation: listFadeIn 0.25s ease both;
    }

    .cal-item:last-child {
      border-bottom: none;
    }

    .cal-item:hover {
      background: var(--primary-bg);
    }

    @keyframes listFadeIn {
      from {
        opacity: 0;
        transform: translateX(-6px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .cal-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      flex: 1;
    }

    /* ── Custom Checkbox ── */
    .cal-checkbox,
    input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s ease;
      background: var(--surface);
    }

    .cal-checkbox:checked,
    input[type="checkbox"]:checked {
      background: var(--gradient-pull);
      border-color: var(--primary);
    }

    .cal-checkbox:checked::after,
    input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 5px;
      width: 4px;
      height: 8px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      animation: checkPop 0.2s ease;
    }

    @keyframes checkPop {
      0% {
        transform: rotate(45deg) scale(0);
      }

      60% {
        transform: rotate(45deg) scale(1.2);
      }

      100% {
        transform: rotate(45deg) scale(1);
      }
    }

    .cal-checkbox:hover,
    input[type="checkbox"]:hover {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    /* ── Select All / Deselect Button ── */
    .select-all-btn {
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--primary-bg);
      transition: all 0.2s ease;
      border: none;
    }

    .select-all-btn:hover {
      background: var(--primary);
      color: white;
    }

    /* ── Date Inputs ── */
    .date-section {
      margin-bottom: 14px;
    }

    .date-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 5px;
      display: block;
      letter-spacing: 0.02em;
    }

    .date-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .date-wrapper {
      flex: 1;
      min-width: 0;
    }

    .date-input {
      width: 100%;
      padding: 9px 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--surface);
      transition: all 0.2s ease;
      outline: none;
    }

    .date-input:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 0;
      height: 40px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.01em;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: rgba(255, 255, 255, 0.15);
      transition: opacity 0.2s ease;
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn-primary {
      background: var(--gradient-pull);
      color: white;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(99, 102, 241, 0.3);
    }

    .btn-success {
      background: var(--gradient-push);
      color: white;
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }

    .btn-success:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
    }

    .btn-success:active {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(16, 185, 129, 0.3);
    }

    .btn .material-icons-outlined {
      font-size: 17px;
    }

    /* ── Loading Overlay ── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(245, 243, 255, 0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }

    .spinner {
      border: 3px solid var(--border-light);
      border-top: 3px solid var(--primary);
      border-right: 3px solid var(--primary-light);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      animation: spin 0.8s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* ── Toast ── */
    .toast {
      visibility: hidden;
      min-width: 220px;
      background: var(--text);
      color: #fff;
      text-align: center;
      border-radius: var(--radius-sm);
      padding: 11px 18px;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 500;
      z-index: 101;
      box-shadow: var(--shadow-lg);
    }

    .toast.show {
      visibility: visible;
      animation: toastIn 0.35s ease, toastOut 0.35s ease 3.15s;
    }

    .toast.error-toast {
      background: var(--danger);
    }

    @keyframes toastIn {
      from {
        bottom: 0;
        opacity: 0;
        transform: translateX(-50%) scale(0.95);
      }

      to {
        bottom: 30px;
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    @keyframes toastOut {
      from {
        bottom: 30px;
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }

      to {
        bottom: 0;
        opacity: 0;
        transform: translateX(-50%) scale(0.95);
      }
    }

    /* ── Error & Empty State ── */
    .error-text {
      color: var(--danger);
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      padding: 20px 10px;
    }

    .empty-state {
      padding: 30px 15px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <span class="material-icons-outlined">event_note</span>
    <div class="header-title">Calendar Sync</div>
  </div>

  <!-- Main Content -->
  <div class="container">

    <!-- Calendar Selector (Expandable) -->
    <div class="cal-section">
      <div class="section-label">
        <span class="material-icons-outlined">date_range</span> Import Settings
      </div>
      <div class="card">
        <div class="card-title">
          <span>Calendars</span>
          <span class="select-all-btn" id="toggleSelect" onclick="toggleSelectAll()">Select All</span>
        </div>

        <div class="cal-list-container" id="calendarList">
          <div class="empty-state">
            <div class="spinner"></div>
          </div>
        </div>

        <div class="date-section">
          <div class="date-row">
            <div class="date-wrapper">
              <span class="date-label">Start Date</span>
              <input type="date" id="startDate" class="date-input">
            </div>
            <div class="date-wrapper">
              <span class="date-label">End Date</span>
              <input type="date" id="endDate" class="date-input">
            </div>
          </div>
        </div>

        <button class="btn btn-primary" onclick="runPull()">
          <span class="material-icons-outlined">cloud_download</span>
          Pull Events
        </button>
      </div>
    </div>

    <!-- Sync Actions -->
    <div>
      <div class="section-label">
        <span class="material-icons-outlined">sync</span> Sync Actions
      </div>
      <div class="card">
        <button class="btn btn-success" onclick="runPush()">
          <span class="material-icons-outlined">cloud_upload</span>
          Push Changes
        </button>
      </div>
    </div>

  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Processing…</div>
  </div>
  <div id="toast" class="toast">Done</div>

  <?!= _App_include('SidebarShared'); ?>
  <script>

    let allSelected = false;

    function formatLocalDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    window.onload = function () {
      const today = new Date();
      const past = new Date(); past.setMonth(today.getMonth() - 1);
      const future = new Date(); future.setMonth(today.getMonth() + 3);

      document.getElementById('startDate').value = formatLocalDate(past);
      document.getElementById('endDate').value = formatLocalDate(future);

      loadData();
    };

    function loadData() {
      SyncSidebar.call('CALENDAR_SYNC', 'getLoadData', {}, {
        loading: 'Loading calendars...',
        onSuccess: populateUI,
        onError: err => {
          document.getElementById('calendarList').innerHTML = `<div class="error-text">${err.message}</div>`;
        }
      });
    }

    function populateUI(data) {
      const container = document.getElementById('calendarList');
      container.innerHTML = '';

      if (!data || !data.calendars || data.calendars.length === 0) {
        container.innerHTML = '<div class="empty-state">No calendars found.</div>';
        return;
      }

      data.calendars.forEach((cal, idx) => {
        const item = document.createElement('div');
        item.className = 'cal-item';
        item.style.animationDelay = (idx * 0.04) + 's';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'cal-checkbox';
        checkbox.value = cal.id;

        if (data.savedCalIds && data.savedCalIds.includes(cal.id)) checkbox.checked = true;

        checkbox.onchange = updateSelectAllButton;
        item.onclick = (e) => {
          if (e.target !== checkbox) {
            checkbox.checked = !checkbox.checked;
            updateSelectAllButton();
          }
        };

        const label = document.createElement('span');
        label.className = 'cal-name';
        label.innerText = cal.name;

        item.appendChild(checkbox);
        item.appendChild(label);
        container.appendChild(item);
      });

      if (data.savedStartDate) document.getElementById('startDate').value = data.savedStartDate.substring(0, 10);
      if (data.savedEndDate) document.getElementById('endDate').value = data.savedEndDate.substring(0, 10);

      updateSelectAllButton();
    }

    function toggleSelectAll() {
      const checkboxes = document.querySelectorAll('.cal-checkbox');
      allSelected = !allSelected;
      checkboxes.forEach(cb => cb.checked = allSelected);
      updateSelectAllButton();
    }

    function toggleLoading(show, text) {
      SyncSidebar.toggleLoading(show, text);
    }

    function showToast(msg, isError) {
      SyncSidebar.showToast(msg, isError, { duration: 3000 });
    }

    function runPull() {
      // Direct call to pullEvents, as App.exec handles the wrapper
      executePull();
    }

    function executePull() {
      const checkboxes = document.querySelectorAll('.cal-checkbox:checked');
      const calIds = Array.from(checkboxes).map(c => c.value);
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      if (calIds.length === 0) return showToast("Select a calendar", true);
      if (!startDate || !endDate) return showToast("Select dates", true);

      SyncSidebar.call('CALENDAR_SYNC', 'pullEvents', { calIds, startDate, endDate }, {
        loading: "Importing events...",
        onSuccess: res => { showToast(res.message, false); }
      });
    }

    function updateSelectAllButton() {
      const allCheckboxes = document.querySelectorAll('.cal-checkbox');
      const checkedCheckboxes = document.querySelectorAll('.cal-checkbox:checked');
      const btn = document.getElementById('toggleSelect');

      if (checkedCheckboxes.length === allCheckboxes.length && allCheckboxes.length > 0) {
        allSelected = true;
        btn.innerText = "Deselect";
      } else {
        allSelected = false;
        btn.innerText = "Select All";
      }
    }

    function runPush() {
      SyncSidebar.call('CALENDAR_SYNC', 'pushChanges', {}, {
        loading: "Syncing changes...",
        onSuccess: res => { showToast(res.message, false); }
      });
    }
  </script>
</body>

</html>
