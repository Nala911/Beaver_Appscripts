<!DOCTYPE html>

  Instructions:
  1. This file relies heavily on `SidebarShared.html`. 
  2. Do not include your own `loader` or basic CSS resets, they are already injected.
  3. If you need bespoke styling, add it under the `<style>` tag below.
-->
<html>
<head>
    <base target="_top">
    <!-- Inject Unified Toolkit (CSS, Typography, Color Palette, and Common JS) -->
    <?!= _App_include('SidebarShared'); ?>

    <style>
        /* Add Tool-specific styles here */
        .template-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 8px;
        }

        .action-button {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Unified Header Section (provided by SidebarShared, optionally overridden) -->
    <div class="sidebar-header">
        <div class="header-title">⚙️ Template Tool</div>
        <div class="header-subtitle">Standardized Plugin Architecture</div>
    </div>

    <!-- Main Content Area -->
    <div class="template-body">
        
        <p class="section-description">
            This is a scaffolded tool. Use the button below to interact with the backend Google Apps Script function.
        </p>

        <!-- Form Elements -->
        <div class="form-group">
            <label for="sampleInput">Sample Input</label>
            <input type="text" id="sampleInput" placeholder="Enter parameters...">
        </div>

        <button onclick="executeBackendAction()" class="btn btn-primary action-button">
            Run Template Action
        </button>

    </div>

    <!-- The unified status/loading container provided by SidebarShared -->
    <!-- Do NOT write your own spinner logic. Just use uiUtils.showLoading() -->
    <div id="status-div"></div>

    <script>
        /**
         * Interacts with the Apps Script backend.
         */
        function executeBackendAction() {
            var inputVal = document.getElementById('sampleInput').value;
            
            // 1. Show the global loader inside #status-div
            uiUtils.showLoading('Processing action...');

            // 2. Call the registered backend function (ensure it returns {success, message})
            // IMPORTANT: The backend function MUST be wrapped in Logger.run!
            google.script.run
                .withSuccessHandler(function(response) {
                    if (response && response.success) {
                        // Show success state
                        uiUtils.showSuccess(response.message || 'Action completed.');
                    } else {
                        // Display internal failure handled safely by the backend
                        uiUtils.showError(response ? response.message : 'Unknown failure.');
                    }
                })
                .withFailureHandler(function(error) {
                    // Display fatal GAS execution error (e.g. syntax error or timeout)
                    uiUtils.showError(error.message || 'A catastrophic system error occurred.');
                })
                .TemplateTool_processAction({ input: inputVal });
        }
    </script>
</body>
</html>
