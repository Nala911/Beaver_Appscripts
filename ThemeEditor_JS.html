<script>
// Global Error Catcher
        window.onerror = function (msg, url, line, col, error) {
            const detail = `Error: ${msg}\nURL: ${url}\nLine: ${line}, Col: ${col}${error ? '\nStack: ' + error.stack : ''}`;
            SyncSidebar.logClientError(detail, 'Global Error');
            return false;
        };

        let currentTheme = null;
        let defaultTheme = null;

        // Initialize from server
        window.onload = function() {
            SyncSidebar.run('UI_getThemeConfig', [], {
                context: 'Get Theme Config',
                onSuccess: function(res) {
                    initDashboard((res && res.data) ? res.data : res);
                }
            });
        };

        function initDashboard(config) {
            if (!config) return;
            currentTheme = config.current;
            defaultTheme = config.defaults;

            mapDataToInputs(currentTheme);
            bindLivePreviewEvents();

            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('theme-form').style.display = 'grid';
            }, 300);
        }

        // Actions
        function saveTheme() {
            const btn = document.getElementById('saveBtn');
            if (!btn.dataset.originalText) btn.dataset.originalText = btn.innerHTML;
            const originalText = btn.dataset.originalText;
            
            btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;margin:0;margin-right:8px;border-top-color:white;"></div> Saving...';
            btn.disabled = true;

            const updatedTheme = mapInputsToData(currentTheme);

            SyncSidebar.run('UI_saveThemeConfig', [updatedTheme], {
                context: 'Save Theme',
                onSuccess: function(res) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    SyncSidebar.showToast(res.message);
                    currentTheme = updatedTheme;
                },
                onError: function() {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            });
        }

        function resetTheme() {
            if (!confirm("Revert all styles back to WorkspaceSync defaults?")) return;

            const btn = document.getElementById('resetBtn');
            if (!btn.dataset.originalText) btn.dataset.originalText = btn.innerHTML;
            const originalText = btn.dataset.originalText;

            btn.innerHTML = 'Resetting...';
            btn.disabled = true;

            SyncSidebar.run('UI_resetThemeConfig', [], {
                context: 'Reset Theme',
                onSuccess: function(res) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    SyncSidebar.showToast(res.message);
                    mapDataToInputs(defaultTheme);
                    currentTheme = JSON.parse(JSON.stringify(defaultTheme));
                },
                onError: function() {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            });
        }

        // Sidebar Navigation
        function switchTab(tabId, el) {
            // Update nav active state
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            el.classList.add('active');

            // Hide all sections, show target
            document.querySelectorAll('.settings-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById('sec-' + tabId).classList.add('active');
        }

        // Custom Segment Control Logic
        function selectSegment(el, value) {
            const container = el.parentElement;
            container.querySelectorAll('.segment').forEach(seg => seg.classList.remove('active'));
            el.classList.add('active');
            container.dataset.value = value;

            // Trigger live preview update manually since it's not a standard input
            updateLivePreviewFromEl(container);
        }

        // UI Binding & Live Preview Logic
        function bindLivePreviewEvents() {
            // Text boxes, Search, Color Pickers
            document.querySelectorAll('input, select').forEach(el => {
                if (el.dataset.path) {
                    el.addEventListener('input', function () {
                        if (this.type === 'color') {
                            this.nextElementSibling.value = this.value; // Sync hex
                        }
                        updateLivePreviewFromEl(this);
                    });
                } else if (el.classList.contains('color-hex')) {
                    el.addEventListener('input', function () {
                        let hex = this.value;
                        if (!hex.startsWith('#')) hex = '#' + hex;
                        
                        // Check if it's a valid hex
                        if (/^#([0-9A-F]{3}){1,2}$/i.test(hex)) {
                            const colorPicker = this.previousElementSibling;
                            colorPicker.value = hex;
                            colorPicker.dispatchEvent(new Event('input'));
                        }
                    });
                    
                    el.addEventListener('blur', function() {
                        const colorPicker = this.previousElementSibling;
                        this.value = colorPicker.value;
                    });
                }
            });
        }

        function updateLivePreviewFromEl(el) {
            const cssVar = el.dataset.var;
            let val = el.value || el.dataset.value;
            const suffix = el.dataset.suffix || '';

            if (cssVar && val !== undefined) {
                if (cssVar === '--sheet-font-primary' || cssVar === '--sheet-font-mono') {
                    val = '"' + val + '", sans-serif';
                } else if (cssVar === '--sheet-border-style') {
                    // Map Google Sheets BorderStyle enum names to CSS equivalents
                    const borderMap = {
                        'SOLID': { style: 'solid', width: '1px' },
                        'SOLID_MEDIUM': { style: 'solid', width: '2px' },
                        'SOLID_THICK': { style: 'solid', width: '3px' },
                        'DASHED': { style: 'dashed', width: '1px' },
                        'DOTTED': { style: 'dotted', width: '1px' },
                        'DOUBLE': { style: 'double', width: '3px' }
                    };
                    const mapped = borderMap[val] || borderMap['SOLID'];
                    document.documentElement.style.setProperty('--sheet-border-style', mapped.style);
                    document.documentElement.style.setProperty('--sheet-border-width', mapped.width);
                    return;
                } else if (cssVar === '--sheet-body-wrap') {
                    // Map enum wrap strategy to explicit CSS rules for the live preview table content cells
                    if (val === 'WRAP') {
                        document.documentElement.style.setProperty('--mock-white-space', 'normal');
                        document.documentElement.style.setProperty('--mock-overflow', 'visible');
                        document.documentElement.style.setProperty('--mock-text-overflow', 'clip');
                    } else if (val === 'OVERFLOW') {
                        document.documentElement.style.setProperty('--mock-white-space', 'nowrap');
                        document.documentElement.style.setProperty('--mock-overflow', 'visible');
                        document.documentElement.style.setProperty('--mock-text-overflow', 'clip');
                    } else { // CLIP
                        document.documentElement.style.setProperty('--mock-white-space', 'nowrap');
                        document.documentElement.style.setProperty('--mock-overflow', 'hidden');
                        document.documentElement.style.setProperty('--mock-text-overflow', 'clip');
                    }
                    return; // Return early, custom processing applied
                }
                document.documentElement.style.setProperty(cssVar, val + suffix);
            }
        }

        // Range & Number sync
        function syncRangeNum(rangeEl) {
            rangeEl.nextElementSibling.value = rangeEl.value;
        }
        function syncNumRange(numEl) {
            numEl.previousElementSibling.value = numEl.value;
            // dispatch input event to trigger live preview
            numEl.previousElementSibling.dispatchEvent(new Event('input'));
        }


        // Data Mapping (Data -> UI)
        function mapDataToInputs(themeObj) {
            document.querySelectorAll('[data-path]').forEach(el => {
                const path = el.getAttribute('data-path');
                const val = getDeepValue(themeObj, path);
                if (val !== undefined && val !== null) {

                    if (el.classList.contains('segmented-control')) {
                        el.dataset.value = val;
                        el.querySelectorAll('.segment').forEach(seg => {
                            const onclickAttr = seg.getAttribute('onclick');
                            const match = onclickAttr ? onclickAttr.match(/'([^']+)'/)[1] : '';
                            const targetVal = val.toString().toLowerCase();
                            
                            if ((match && match === targetVal) || (!match && seg.textContent.toLowerCase().includes(targetVal))) {
                                seg.classList.add('active');
                            } else {
                                seg.classList.remove('active');
                            }
                        });
                        updateLivePreviewFromEl(el);
                    } else {
                        el.value = val;
                        // specific UI syncing
                        if (el.type === 'color') {
                            el.nextElementSibling.value = val;
                        }
                        if (el.type === 'range') {
                            el.nextElementSibling.value = val;
                        }
                        updateLivePreviewFromEl(el);
                    }
                }
            });
        }

        // Data Mapping (UI -> Data)
        function mapInputsToData(baseObj) {
            const newTheme = JSON.parse(JSON.stringify(baseObj));
            document.querySelectorAll('[data-path]').forEach(el => {
                const path = el.getAttribute('data-path');
                let val;

                if (el.classList.contains('segmented-control')) {
                    val = el.dataset.value;
                } else {
                    val = el.value;
                    if (el.type === 'range' || el.type === 'number') val = parseInt(val, 10);
                }

                setDeepValue(newTheme, path, val);
            });
            return newTheme;
        }

        function getDeepValue(obj, path) {
            return path.split('.').reduce((acc, part) => acc && acc[part], obj);
        }

        function setDeepValue(obj, path, value) {
            const parts = path.split('.');
            const last = parts.pop();
            const target = parts.reduce((acc, part) => {
                if (!acc[part]) acc[part] = {};
                return acc[part];
            }, obj);
            target[last] = value;
        }

        function runSystemAudit() {
            const btn = document.getElementById('btn-run-audit');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Running...';
            btn.disabled = true;

            const container = document.getElementById('audit-results-container');
            container.style.display = 'flex';
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#6b7280;">Analyzing system...</div>';

            SyncSidebar.run('System_runAudit', [], {
                context: 'System Audit',
                onSuccess: function(res) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    renderAuditResults(res.data || res);
                },
                onError: function() {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    container.innerHTML = '<div style="color:#dc2626; padding:10px;">Audit failed to run. Check connectivity or system health.</div>';
                }
            });
        }

        function renderAuditResults(data) {
            const container = document.getElementById('audit-results-container');
            container.innerHTML = '';

            if (!data || !data.details) {
                container.innerHTML = '<div style="color:#dc2626;">Invalid response from server.</div>';
                return;
            }

            // Summary Header
            const summaryDiv = document.createElement('div');
            summaryDiv.style.padding = '12px';
            summaryDiv.style.background = '#e5e7eb';
            summaryDiv.style.borderRadius = '4px';
            summaryDiv.style.fontWeight = '600';
            summaryDiv.style.marginBottom = '10px';
            summaryDiv.innerHTML = `Audit Summary: <span style="color:#059669">${data.summary.passed} Passed</span> | <span style="color:#d97706">${data.summary.warnings} Warnings</span> | <span style="color:#dc2626">${data.summary.errors} Errors</span>`;
            container.appendChild(summaryDiv);

            // Details
            data.details.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.style.padding = '12px';
                itemDiv.style.background = '#fff';
                itemDiv.style.border = '1px solid #d1d5db';
                itemDiv.style.borderRadius = '4px';

                let statusColor = '#059669'; // Success
                if (item.status === 'WARN') statusColor = '#d97706';
                if (item.status === 'ERROR') statusColor = '#dc2626';

                let html = `<div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                <strong style="color:#374151;">${item.title}</strong>
                                <span style="color:${statusColor}; font-weight:600; font-size:12px;">${item.status}</span>
                            </div>`;

                if (item.issues && item.issues.length > 0) {
                    html += `<ul style="margin:8px 0 0 0; padding-left:20px; font-size:12px; color:#4b5563;">`;
                    item.issues.forEach(issue => {
                        html += `<li style="margin-bottom:4px;">${issue}</li>`;
                    });
                    html += `</ul>`;
                } else if (item.status === 'SUCCESS') {
                     html += `<div style="font-size:12px; color:#6b7280;">All checks passed.</div>`;
                }
                
                itemDiv.innerHTML = html;
                container.appendChild(itemDiv);
            });
        }
</script>
