<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>

    <!-- Header -->
    <div class="header">
        <span class="material-icons-outlined">settings_suggest</span>
        <div class="header-title">Pipeline Control</div>
        <button class="refresh-btn" onclick="loadDashboard()" title="Refresh Dashboard">
            <span class="material-icons-outlined">refresh</span>
        </button>
    </div>

    <!-- Main Content -->
    <div class="container">

        <!-- Dashboard Overview -->
        <div>
            <div class="section-label">
                <span class="material-icons-outlined">analytics</span> Overview
            </div>
            <div class="card">
                <div class="toggle-container">
                    <span id="systemStatusLabel" style="color: var(--text-secondary);">System Checking...</span>
                    <label class="switch">
                        <input type="checkbox" id="systemToggle" disabled onchange="toggleSystem()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Pipelines List -->
        <div class="pipeline-section">
            <div class="section-label">
                <span class="material-icons-outlined">account_tree</span> Pipelines
            </div>
            <div class="card">
                <div class="card-title">
                    <span>Available Pipelines</span>
                    <span class="select-all-btn" id="toggleSelect" onclick="toggleSelectAll()">Select All</span>
                </div>

                <div class="pipeline-list-container" id="pipelineListContainer">
                    <div class="empty-state">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div>
            <div class="section-label">
                <span class="material-icons-outlined">play_circle</span> Actions
            </div>
            <div class="card bottom-actions">
                <button class="btn btn-primary" onclick="runSelected()" id="btnRunSelected">
                    <span class="material-icons-outlined">play_arrow</span>
                    Run Pipelines
                </button>
                <button class="btn btn-secondary" onclick="formatSheet()" id="btnFormat">
                    <span class="material-icons-outlined">auto_awesome</span>
                    Format Active Sheet
                </button>
            </div>
        </div>

    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Loading Dashboard…</div>
    </div>
    <div id="toast" class="toast">Done</div>
